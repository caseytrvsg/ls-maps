name: Update fuel prices

on:
  schedule:
    - cron: "17 */3 * * *"   # every 3 hours (feeds refresh slowly; stays well under limits)
  workflow_dispatch:          # allow manual runs

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Fetch and merge CMA fuel feeds
        run: node scripts/fetch-fuel-prices.mjs
      - name: Commit updated prices
        run: |
          git config user.name "waypoint-bot"
          git config user.email "actions@github.com"
          git add data/fuel_prices.json
          if git diff --staged --quiet; then
            echo "No price changes."
          else
            git commit -m "chore: refresh fuel prices [skip ci]"
            git push
          fi
